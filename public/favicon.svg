<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6e"/>
      <stop offset="100%" style="stop-color:#2878c8"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60b8ff"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- 12 wheel segments -->
  <g transform="translate(32,32)">
    <!-- Segment lines -->
    <line x1="0" y1="-27" x2="0" y2="-10" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="13.5" y1="-23.4" x2="5" y2="-8.66" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="23.4" y1="-13.5" x2="8.66" y2="-5" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="27" y1="0" x2="10" y2="0" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="23.4" y1="13.5" x2="8.66" y2="5" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="13.5" y1="23.4" x2="5" y2="8.66" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="0" y1="27" x2="0" y2="10" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="-13.5" y1="23.4" x2="-5" y2="8.66" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="-23.4" y1="13.5" x2="-8.66" y2="5" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="-27" y1="0" x2="-10" y2="0" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="-23.4" y1="-13.5" x2="-8.66" y2="-5" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="-13.5" y1="-23.4" x2="-5" y2="-8.66" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="10" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <!-- Filled sectors (life areas) with colors -->
    <path d="M0,0 L0,-22 A22,22,0,0,1,11,-19.05 Z" fill="#e06070" opacity="0.85"/>
    <path d="M0,0 L11,-19.05 A22,22,0,0,1,19.05,-11 Z" fill="#e88840" opacity="0.85"/>
    <path d="M0,0 L19.05,-11 A22,22,0,0,1,22,0 Z" fill="#e8c840" opacity="0.85"/>
    <path d="M0,0 L22,0 A22,22,0,0,1,19.05,11 Z" fill="#70c840" opacity="0.85"/>
    <path d="M0,0 L19.05,11 A22,22,0,0,1,11,19.05 Z" fill="#40b890" opacity="0.85"/>
    <path d="M0,0 L11,19.05 A22,22,0,0,1,0,22 Z" fill="#4090e0" opacity="0.85"/>
    <path d="M0,0 L0,22 A22,22,0,0,1,-11,19.05 Z" fill="#7060d0" opacity="0.85"/>
    <path d="M0,0 L-11,19.05 A22,22,0,0,1,-19.05,11 Z" fill="#c040a0" opacity="0.85"/>
    <path d="M0,0 L-19.05,11 A22,22,0,0,1,-22,0 Z" fill="#e04060" opacity="0.85"/>
    <path d="M0,0 L-22,0 A22,22,0,0,1,-19.05,-11 Z" fill="#e06830" opacity="0.85"/>
    <path d="M0,0 L-19.05,-11 A22,22,0,0,1,-11,-19.05 Z" fill="#d0b020" opacity="0.85"/>
    <path d="M0,0 L-11,-19.05 A22,22,0,0,1,0,-22 Z" fill="#50a830" opacity="0.85"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="white" opacity="0.95"/>
    <circle cx="0" cy="0" r="2" fill="url(#ring)"/>
  </g>
</svg>