<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="bgL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6e"/>
      <stop offset="100%" style="stop-color:#2878c8"/>
    </linearGradient>
    <linearGradient id="txtG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a3a6e"/>
      <stop offset="100%" style="stop-color:#2878c8"/>
    </linearGradient>
  </defs>

  <!-- Wheel icon 72x72 centered at 36,40 -->
  <circle cx="40" cy="40" r="36" fill="url(#bgL)"/>
  <g transform="translate(40,40)">
    <!-- 12 sectors -->
    <path d="M0,0 L0,-28 A28,28,0,0,1,14,-24.25 Z" fill="#e06070" opacity="0.9"/>
    <path d="M0,0 L14,-24.25 A28,28,0,0,1,24.25,-14 Z" fill="#e88840" opacity="0.9"/>
    <path d="M0,0 L24.25,-14 A28,28,0,0,1,28,0 Z" fill="#e8c840" opacity="0.9"/>
    <path d="M0,0 L28,0 A28,28,0,0,1,24.25,14 Z" fill="#70c840" opacity="0.9"/>
    <path d="M0,0 L24.25,14 A28,28,0,0,1,14,24.25 Z" fill="#40b890" opacity="0.9"/>
    <path d="M0,0 L14,24.25 A28,28,0,0,1,0,28 Z" fill="#4090e0" opacity="0.9"/>
    <path d="M0,0 L0,28 A28,28,0,0,1,-14,24.25 Z" fill="#7060d0" opacity="0.9"/>
    <path d="M0,0 L-14,24.25 A28,28,0,0,1,-24.25,14 Z" fill="#c040a0" opacity="0.9"/>
    <path d="M0,0 L-24.25,14 A28,28,0,0,1,-28,0 Z" fill="#e04060" opacity="0.9"/>
    <path d="M0,0 L-28,0 A28,28,0,0,1,-24.25,-14 Z" fill="#e06830" opacity="0.9"/>
    <path d="M0,0 L-24.25,-14 A28,28,0,0,1,-14,-24.25 Z" fill="#d0b020" opacity="0.9"/>
    <path d="M0,0 L-14,-24.25 A28,28,0,0,1,0,-28 Z" fill="#50a830" opacity="0.9"/>
    <!-- Dividers -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <circle cx="0" cy="0" r="11" fill="white" opacity="0.95"/>
    <circle cx="0" cy="0" r="5" fill="url(#bgL)"/>
    <!-- Spoke lines -->
    <g stroke="rgba(255,255,255,0.3)" stroke-width="0.8">
      <line x1="0" y1="-28" x2="0" y2="-11"/>
      <line x1="14" y1="-24.25" x2="5.5" y2="-9.5"/>
      <line x1="24.25" y1="-14" x2="9.5" y2="-5.5"/>
      <line x1="28" y1="0" x2="11" y2="0"/>
      <line x1="24.25" y1="14" x2="9.5" y2="5.5"/>
      <line x1="14" y1="24.25" x2="5.5" y2="9.5"/>
      <line x1="0" y1="28" x2="0" y2="11"/>
      <line x1="-14" y1="24.25" x2="-5.5" y2="9.5"/>
      <line x1="-24.25" y1="14" x2="-9.5" y2="5.5"/>
      <line x1="-28" y1="0" x2="-11" y2="0"/>
      <line x1="-24.25" y1="-14" x2="-9.5" y2="-5.5"/>
      <line x1="-14" y1="-24.25" x2="-5.5" y2="-9.5"/>
    </g>
  </g>

  <!-- Text -->
  <text x="88" y="34" font-family="Georgia, serif" font-size="22" font-weight="700"
    fill="url(#txtG)" letter-spacing="0.5">Колесо</text>
  <text x="88" y="58" font-family="Georgia, serif" font-size="22" font-weight="300"
    fill="#2878c8" letter-spacing="1">Життя</text>
  <text x="89" y="72" font-family="Arial, sans-serif" font-size="9" font-weight="400"
    fill="#5a80aa" letter-spacing="2">LIFE BALANCE AI</text>
</svg>